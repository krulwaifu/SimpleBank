services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: simplebank
      POSTGRES_USER: simplebank
      POSTGRES_PASSWORD: simplebank
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - simplebank-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U simplebank"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: .
    ports:
      - "8000:8000"
    environment:
      DB_NAME: simplebank
      DB_USER: simplebank
      DB_PASSWORD: simplebank
      DB_HOST: db
      DB_PORT: "5432"
      ALLOWED_HOSTS: "localhost,127.0.0.1,0.0.0.0"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - simplebank-net

volumes:
  postgres_data:

networks:
  simplebank-net:
    driver: bridge
